<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English to Hindi Translator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 16px;
            resize: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #4e73df;
            outline: none;
            box-shadow: 0 0 0 3px rgba(78,115,223,0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            background: #4e73df;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e59d9;
            transform: translateY(-2px);
        }

        .result-box {
            margin-top: 25px;
        }

        .result-box h4 {
            margin-bottom: 8px;
            color: #444;
        }

        .output {
            background: #f8f9fc;
            padding: 15px;
            border-radius: 10px;
            min-height: 50px;
            border: 1px solid #ddd;
        }

        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }

            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🌍 Language Translator (English → Hindi)</h2>

    <form method="POST">
        <textarea name="data" rows="5" placeholder="Enter English text here..." required></textarea>
        <button type="submit">Translate</button>
    </form>

    {% if translated_text %}
    <div class="result-box">
        <h4>Translated Result:</h4>
        <div class="output">
            {{ translated_text }}
        </div>
    </div>
    {% endif %}
</div>

    // Auto focus on textarea when page loads
    window.onload = function() {
        document.querySelector("textarea").focus();
    };
</script> -->

</body>
</html>
